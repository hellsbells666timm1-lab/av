<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Азбука Вкуса — Школа Сборщика | Обучение WMS</title>
<style>
:root {
  --av-dark: #1B5E3F;
  --av-darker: #0F3D26;
  --av-green: #4CAF50;
  --av-light: #66BB6A;
  --av-pale: #C8E6C9;
  --av-bg: #F5F9F5;
  --av-cream: #FFF8E7;
  --av-warning: #FF9800;
  --av-danger: #E53935;
  --text: #1A2E22;
  --text-soft: #4A5D52;
  --white: #FFFFFF;
  --shadow: 0 4px 24px rgba(27, 94, 63, 0.12);
  --shadow-hover: 0 8px 32px rgba(27, 94, 63, 0.2);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  background: var(--av-bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* ============== HEADER ============== */
header {
  background: linear-gradient(135deg, var(--av-darker) 0%, var(--av-dark) 100%);
  color: var(--white);
  padding: 18px 32px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.logo-block { display: flex; align-items: center; gap: 14px; }
.logo-circle {
  width: 48px; height: 48px;
  background: var(--av-green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 18px;
  color: var(--av-darker);
  font-family: Georgia, serif;
  position: relative;
}
.logo-circle::before {
  content: ''; position: absolute; top: -4px; right: 6px;
  width: 8px; height: 10px;
  background: var(--av-green);
  border-radius: 50% 50% 50% 0;
  transform: rotate(35deg);
}
.logo-text { font-size: 20px; font-weight: 600; letter-spacing: 0.3px; }
.logo-sub { font-size: 11px; opacity: 0.7; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;}

.progress-wrap { display: flex; align-items: center; gap: 12px; flex: 1; max-width: 380px; }
.progress-track {
  flex: 1; height: 8px; background: rgba(255,255,255,0.15);
  border-radius: 100px; overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--av-light), var(--av-pale));
  border-radius: 100px;
  transition: width 0.5s ease;
  box-shadow: 0 0 12px rgba(102,187,106,0.5);
}
.progress-text { font-size: 13px; font-weight: 600; min-width: 50px; }

.user-mini {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.08);
  padding: 6px 14px 6px 6px;
  border-radius: 100px;
  font-size: 13px;
}
.user-avatar {
  width: 32px; height: 32px;
  background: var(--av-green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; color: var(--av-darker);
}

/* ============== MAIN LAYOUT ============== */
.app { display: flex; min-height: calc(100vh - 84px); }

/* Sidebar */
.sidebar {
  width: 320px;
  background: var(--white);
  padding: 24px 0;
  border-right: 1px solid #e6ede8;
  overflow-y: auto;
  max-height: calc(100vh - 84px);
  position: sticky;
  top: 84px;
}
.sidebar h3 {
  padding: 0 24px 16px;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-soft);
  font-weight: 700;
}

.module-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 24px;
  cursor: pointer;
  transition: all 0.2s;
  border-left: 3px solid transparent;
  position: relative;
}
.module-item:hover { background: var(--av-bg); }
.module-item.active {
  background: linear-gradient(90deg, var(--av-pale) 0%, var(--av-bg) 100%);
  border-left-color: var(--av-dark);
}
.module-item.completed .module-num {
  background: var(--av-green); color: var(--white);
}
.module-item.completed .module-num::after {
  content: '✓'; position: absolute;
}
.module-item.completed .module-num span { display: none; }

.module-num {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #e6ede8;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px;
  color: var(--av-dark);
  flex-shrink: 0;
  transition: all 0.3s;
  position: relative;
}
.module-item.active .module-num {
  background: var(--av-dark); color: var(--white);
  box-shadow: 0 0 0 4px var(--av-pale);
}
.module-text { flex: 1; }
.module-title { font-weight: 600; font-size: 14px; line-height: 1.3; }
.module-meta { font-size: 11px; color: var(--text-soft); margin-top: 2px; }

.lock-icon { width: 16px; height: 16px; opacity: 0.4; }
.module-item.locked { cursor: not-allowed; opacity: 0.5; }
.module-item.locked:hover { background: transparent; }

/* Content */
.content {
  flex: 1;
  padding: 40px 56px;
  max-width: 980px;
  margin: 0 auto;
  width: 100%;
}

.module-header {
  margin-bottom: 32px;
}
.module-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--av-pale);
  color: var(--av-darker);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 100px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 12px;
}
.module-title-big {
  font-size: 36px;
  font-weight: 800;
  color: var(--av-darker);
  line-height: 1.15;
  margin-bottom: 8px;
}
.module-subtitle {
  font-size: 17px;
  color: var(--text-soft);
}

/* Cards */
.card {
  background: var(--white);
  border-radius: 16px;
  padding: 28px;
  margin-bottom: 20px;
  box-shadow: var(--shadow);
  border: 1px solid rgba(27, 94, 63, 0.06);
}
.card h2 {
  color: var(--av-darker);
  font-size: 22px;
  margin-bottom: 14px;
  display: flex; align-items: center; gap: 12px;
}
.card h3 {
  color: var(--av-dark);
  font-size: 17px;
  margin: 18px 0 10px;
  font-weight: 700;
}
.card p { margin-bottom: 12px; }
.card ul, .card ol {
  margin: 12px 0 12px 24px;
}
.card li { margin-bottom: 8px; }

.icon-circle {
  width: 40px; height: 40px;
  background: var(--av-pale);
  border-radius: 12px;
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

/* Highlights */
.highlight {
  padding: 16px 20px;
  border-radius: 12px;
  margin: 16px 0;
  border-left: 4px solid;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.highlight-icon {
  font-size: 22px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 2px;
}
.highlight-content { flex: 1; }
.highlight strong { display: block; margin-bottom: 4px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }

.tip { background: #E8F5E9; border-color: var(--av-green); }
.tip strong { color: var(--av-darker); }
.warn { background: #FFF3E0; border-color: var(--av-warning); }
.warn strong { color: #BF6F00; }
.danger { background: #FFEBEE; border-color: var(--av-danger); }
.danger strong { color: #B71C1C; }
.info { background: #E3F2FD; border-color: #1976D2; }
.info strong { color: #0D47A1; }

/* Steps */
.steps { counter-reset: step; margin: 20px 0; }
.step {
  display: flex; gap: 18px; padding: 16px 0;
  border-bottom: 1px dashed #d8e3dc;
}
.step:last-child { border-bottom: none; }
.step-num {
  counter-increment: step;
  flex-shrink: 0;
  width: 36px; height: 36px;
  background: var(--av-dark);
  color: var(--white);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 15px;
}
.step-num::before { content: counter(step); }
.step-content h4 {
  color: var(--av-darker);
  font-size: 16px;
  margin-bottom: 4px;
}

/* Illustration */
.illustration {
  background: linear-gradient(135deg, #F5F9F5 0%, #E8F5E9 100%);
  border-radius: 16px;
  padding: 24px;
  margin: 20px 0;
  text-align: center;
  border: 1px solid #d8e3dc;
}
.illustration svg { max-width: 100%; height: auto; }
.illustration-caption {
  margin-top: 12px;
  font-size: 13px;
  color: var(--text-soft);
  font-style: italic;
}

/* Grids */
.grid-2 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 16px;
  margin: 18px 0;
}
.grid-3 {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 14px;
  margin: 18px 0;
}

.feature-box {
  background: var(--av-bg);
  padding: 18px;
  border-radius: 12px;
  border: 1px solid #d8e3dc;
}
.feature-box h4 { color: var(--av-darker); margin-bottom: 8px; font-size: 15px;}
.feature-box p { font-size: 14px; margin: 0; color: var(--text-soft);}

/* Table */
.table {
  width: 100%;
  border-collapse: collapse;
  margin: 18px 0;
  background: var(--white);
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(27,94,63,0.06);
}
.table th {
  background: var(--av-dark);
  color: var(--white);
  text-align: left;
  padding: 14px;
  font-weight: 600;
  font-size: 14px;
}
.table td {
  padding: 12px 14px;
  border-bottom: 1px solid #eef2ef;
  font-size: 14px;
}
.table tr:last-child td { border-bottom: none; }
.table tr:nth-child(even) { background: #fafcfa; }

/* Navigation */
.nav-buttons {
  display: flex; justify-content: space-between; gap: 16px;
  margin-top: 32px; padding-top: 24px;
  border-top: 1px solid #d8e3dc;
}
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 26px;
  border-radius: 100px;
  font-weight: 600;
  font-size: 15px;
  cursor: pointer;
  border: none;
  transition: all 0.25s;
  font-family: inherit;
}
.btn-primary {
  background: var(--av-dark);
  color: var(--white);
}
.btn-primary:hover {
  background: var(--av-darker);
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}
.btn-ghost {
  background: transparent;
  color: var(--av-dark);
  border: 2px solid #d8e3dc;
}
.btn-ghost:hover { background: var(--av-bg); border-color: var(--av-green);}
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

/* Quiz */
.quiz {
  background: linear-gradient(135deg, #fff 0%, #f5f9f5 100%);
  border: 2px solid var(--av-pale);
  border-radius: 16px;
  padding: 28px;
  margin: 24px 0;
}
.quiz-header {
  display: flex; align-items: center; gap: 14px;
  margin-bottom: 20px;
}
.quiz-icon {
  width: 48px; height: 48px;
  background: var(--av-dark);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  color: var(--white);
  font-size: 24px;
}
.quiz-title { color: var(--av-darker); font-size: 20px; }
.quiz-question { font-weight: 600; margin: 18px 0 12px; color: var(--text); }
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  background: var(--white);
  border: 2px solid #d8e3dc;
  border-radius: 12px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 15px;
  text-align: left;
  display: flex; align-items: center; gap: 12px;
}
.quiz-option:hover {
  border-color: var(--av-green);
  background: var(--av-bg);
}
.quiz-option.selected { border-color: var(--av-dark); background: var(--av-pale); }
.quiz-option.correct {
  background: #E8F5E9; border-color: var(--av-green);
  animation: pop 0.4s ease;
}
.quiz-option.wrong {
  background: #FFEBEE; border-color: var(--av-danger);
  animation: shake 0.4s ease;
}
.quiz-option .marker {
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #e6ede8;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 12px;
  color: var(--av-dark);
  flex-shrink: 0;
}
.quiz-option.correct .marker { background: var(--av-green); color: white; }
.quiz-option.wrong .marker { background: var(--av-danger); color: white;}

.quiz-feedback {
  margin-top: 16px;
  padding: 14px 16px;
  border-radius: 10px;
  display: none;
  font-size: 14px;
}
.quiz-feedback.show { display: block; animation: slideDown 0.3s ease;}
.quiz-feedback.correct { background: #E8F5E9; color: #1B5E20; border-left: 4px solid var(--av-green); }
.quiz-feedback.wrong { background: #FFEBEE; color: #B71C1C; border-left: 4px solid var(--av-danger); }

/* Welcome screen */
.welcome {
  text-align: center;
  padding: 40px 20px;
}
.welcome-hero {
  background: linear-gradient(135deg, var(--av-darker) 0%, var(--av-dark) 100%);
  color: var(--white);
  padding: 60px 40px;
  border-radius: 24px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.welcome-hero::before {
  content: '';
  position: absolute;
  top: -50px; right: -50px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, var(--av-green) 0%, transparent 70%);
  opacity: 0.3;
}
.welcome-hero::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, var(--av-light) 0%, transparent 70%);
  opacity: 0.2;
}
.welcome-hero h1 {
  font-size: 42px;
  margin-bottom: 12px;
  position: relative;
  z-index: 1;
}
.welcome-hero p {
  font-size: 18px;
  opacity: 0.9;
  max-width: 600px;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 16px;
  margin: 24px 0;
}
.stat-card {
  background: var(--white);
  padding: 22px;
  border-radius: 14px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-num {
  font-size: 36px;
  font-weight: 800;
  color: var(--av-dark);
  display: block;
}
.stat-label {
  color: var(--text-soft);
  font-size: 13px;
  margin-top: 4px;
}

/* Certificate */
.certificate {
  background: linear-gradient(135deg, #fff 0%, #fefbf0 100%);
  border: 8px double var(--av-dark);
  padding: 48px;
  border-radius: 16px;
  text-align: center;
  position: relative;
  margin: 20px 0;
}
.cert-seal {
  position: absolute;
  bottom: 20px; right: 20px;
  width: 100px; height: 100px;
  background: var(--av-green);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-weight: 800;
  font-size: 12px;
  text-align: center;
  line-height: 1.2;
  box-shadow: 0 4px 12px rgba(76, 175, 80, 0.4);
  transform: rotate(-12deg);
}
.cert-title {
  font-family: Georgia, "Times New Roman", serif;
  font-size: 18px;
  color: var(--av-dark);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.cert-name {
  font-family: Georgia, serif;
  font-size: 48px;
  color: var(--av-darker);
  margin: 24px 0;
  font-weight: 700;
  font-style: italic;
}
.cert-text {
  font-size: 16px;
  color: var(--text-soft);
  max-width: 500px;
  margin: 16px auto;
  line-height: 1.6;
}
.cert-input {
  font-family: Georgia, serif;
  font-size: 36px;
  text-align: center;
  border: none;
  border-bottom: 2px solid var(--av-dark);
  background: transparent;
  color: var(--av-darker);
  padding: 8px 16px;
  width: 80%;
  font-weight: 700;
  margin: 16px 0;
  outline: none;
}

/* Animations */
@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-8px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadeIn 0.5s ease; }

/* ТСД device mockup */
.tsd-device {
  display: inline-block;
  background: #2A2A2A;
  border-radius: 22px;
  padding: 12px 8px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.2);
  position: relative;
}
.tsd-screen {
  width: 220px;
  height: 340px;
  background: var(--av-bg);
  border-radius: 6px;
  overflow: hidden;
  border: 2px solid #444;
}
.tsd-scanner {
  width: 100%;
  height: 40px;
  background: linear-gradient(135deg, #555 0%, #333 100%);
  border-radius: 0 0 6px 6px;
  margin-bottom: 4px;
  position: relative;
  display: flex; align-items: center; justify-content: center;
}
.tsd-scanner::before {
  content: '';
  width: 60px; height: 16px;
  background: #1a1a1a;
  border-radius: 4px;
  border: 1px solid #ff4444;
  box-shadow: inset 0 0 10px rgba(255,0,0,0.5);
}

/* Responsive */
@media (max-width: 980px) {
  .sidebar { width: 240px; }
  .content { padding: 24px; }
  .module-title-big { font-size: 28px; }
  .welcome-hero h1 { font-size: 32px; }
  .cert-name { font-size: 32px; }
}
@media (max-width: 720px) {
  .app { flex-direction: column; }
  .sidebar { 
    width: 100%; position: static; max-height: 50vh; 
    border-right: none; border-bottom: 1px solid #e6ede8;
  }
  .content { padding: 20px; }
  header { padding: 14px 18px; }
  .logo-text { font-size: 16px; }
  .progress-wrap { width: 100%; max-width: none; order: 3;}
  .user-mini { font-size: 12px; }
  .module-title-big { font-size: 24px; }
  .cert-name { font-size: 26px; }
  .welcome-hero { padding: 36px 24px; }
  .welcome-hero h1 { font-size: 26px; }
}

/* Hide sections */
.module-section { display: none; }
.module-section.active { display: block; animation: fadeIn 0.4s ease;}

/* Confetti container */
.confetti-overlay {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 9999;
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo-block">
    <img src="logo.png" alt="АВ" style="width: 48px; height: 48px; object-fit: contain;">
    <div>
      <div class="logo-text">Азбука Вкуса</div>
      <div class="logo-sub">Школа Сборщика · WMS</div>
    </div>
  </div>
  
  <div class="progress-wrap">
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div class="progress-text" id="progressText">0 / 10</div>
  </div>
  
  <div class="user-mini">
    <div class="user-avatar" id="userInitial">?</div>
    <span id="userName">Сотрудник</span>
  </div>
</header>

<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>📚 Программа обучения</h3>
    <div id="moduleList"></div>
  </aside>

  <!-- CONTENT -->
  <main class="content" id="content">
    <!-- сюда будут вставлены модули через JS -->
  </main>
</div>

<div class="confetti-overlay" id="confetti"></div>

<script>
// ============== ПРОГРАММА ОБУЧЕНИЯ ==============
const modules = [
  { id: 0, title: 'Добро пожаловать', meta: '2 мин', icon: '🌿' },
  { id: 1, title: 'Общие положения', meta: '5 мин · Раздел 1', icon: '📋' },
  { id: 2, title: 'Начало работы и ТСД', meta: '7 мин · Раздел 2', icon: '📱' },
  { id: 3, title: 'Сбор заказа', meta: '10 мин · Раздел 3', icon: '🛒' },
  { id: 4, title: 'Особые товары', meta: '12 мин · Раздел 3.1', icon: '🍓' },
  { id: 5, title: 'Упаковка заказа', meta: '8 мин · Раздел 3.1.7', icon: '📦' },
  { id: 6, title: 'Отмена заказа', meta: '5 мин · Раздел 4', icon: '↩️' },
  { id: 7, title: 'Передача курьеру', meta: '5 мин · Раздел 5', icon: '🚴' },
  { id: 8, title: 'Контроль сроков', meta: '6 мин · Раздел 8', icon: '⏰' },
  { id: 9, title: 'Размещение товара', meta: '6 мин · Раздел 9', icon: '🥬' },
  { id: 10, title: 'Финальный экзамен', meta: '15 мин · Сертификат', icon: '🎓' }
];

let state = {
  currentModule: 0,
  completed: [],
  userName: '',
  quizScores: {}
};

// Load from localStorage
try {
  const saved = localStorage.getItem('av_wms_training');
  if (saved) state = { ...state, ...JSON.parse(saved) };
} catch(e) {}

function save() {
  try { localStorage.setItem('av_wms_training', JSON.stringify(state)); } catch(e) {}
}

function updateProgress() {
  const total = modules.length - 1; // exclude welcome
  const done = state.completed.filter(id => id > 0).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total;
  if (state.userName) {
    document.getElementById('userName').textContent = state.userName;
    document.getElementById('userInitial').textContent = state.userName[0].toUpperCase();
  }
}

function renderSidebar() {
  const list = document.getElementById('moduleList');
  list.innerHTML = modules.map((m, i) => {
    const completed = state.completed.includes(m.id);
    const active = state.currentModule === m.id;
    const locked = m.id > 0 && !state.completed.includes(m.id - 1);
    const iconHTML = locked 
      ? `<svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>`
      : m.icon;
    return `
      <div class="module-item ${active ? 'active' : ''} ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}" onclick="${locked ? '' : `goTo(${m.id})`}">
        <div class="module-num"><span>${iconHTML}</span></div>
        <div class="module-text">
          <div class="module-title">${m.title}</div>
          <div class="module-meta">${m.meta}</div>
        </div>
      </div>
    `;
  }).join('');
}

function goTo(id) {
  state.currentModule = id;
  save();
  renderSidebar();
  renderContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function markComplete(id) {
  if (!state.completed.includes(id)) {
    state.completed.push(id);
    save();
    updateProgress();
    renderSidebar();
    showConfetti();
  }
}

function showConfetti() {
  const overlay = document.getElementById('confetti');
  const colors = ['#4CAF50', '#66BB6A', '#1B5E3F', '#C8E6C9', '#FFC107'];
  for (let i = 0; i < 30; i++) {
    const piece = document.createElement('div');
    piece.style.cssText = `
      position: absolute;
      width: 10px; height: 14px;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      top: -20px; left: ${Math.random()*100}%;
      opacity: 0.9;
      border-radius: 2px;
      transform: rotate(${Math.random()*360}deg);
      animation: confetti-fall ${2+Math.random()*2}s linear forwards;
    `;
    overlay.appendChild(piece);
    setTimeout(() => piece.remove(), 4000);
  }
}

// Add confetti keyframes
const style = document.createElement('style');
style.textContent = `
  @keyframes confetti-fall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0;}
  }
`;
document.head.appendChild(style);

// ============== QUIZ HANDLER ==============
function answerQuiz(qId, optionIdx, correct) {
  const options = document.querySelectorAll(`[data-quiz="${qId}"]`);
  options.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (i === correct) opt.classList.add('correct');
    if (i === optionIdx && optionIdx !== correct) opt.classList.add('wrong');
  });
  const feedback = document.getElementById('feedback-' + qId);
  if (feedback) {
    feedback.classList.add('show');
    feedback.classList.add(optionIdx === correct ? 'correct' : 'wrong');
  }
  state.quizScores[qId] = (optionIdx === correct);
  save();
  
  let allAnswered = true;
  document.querySelectorAll('.quiz-options').forEach(group => {
    if (!group.querySelector('.correct') && !group.querySelector('.wrong')) {
      allAnswered = false;
    }
  });
  
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn && allAnswered) {
    nextBtn.disabled = false;
  }
}

// ============== РЕНДЕР МОДУЛЕЙ ==============
function renderContent() {
  const id = state.currentModule;
  const content = document.getElementById('content');
  content.innerHTML = MODULES[id] ? MODULES[id]() : '<p>Модуль не найден</p>';
  
  const nextBtn = content.querySelector('.btn-primary[onclick="nextModule()"]');
  if (nextBtn && content.querySelector('.quiz')) {
    nextBtn.id = 'nextBtn';
    if (!state.completed.includes(id)) {
      nextBtn.disabled = true;
    }
  }
  
  // Bind name input if exists
  const nameInput = document.getElementById('userNameInput');
  if (nameInput) {
    nameInput.value = state.userName;
    nameInput.addEventListener('input', e => {
      state.userName = e.target.value;
      save();
      updateProgress();
    });
  }
}

function nextModule() {
  markComplete(state.currentModule);
  if (state.currentModule < modules.length - 1) {
    goTo(state.currentModule + 1);
  }
}
function prevModule() {
  if (state.currentModule > 0) goTo(state.currentModule - 1);
}

    options: ['Сделал ли он фото', 'Прожал ли статус «Заказ получен»', 'Записал ли в журнал'],
    correct: 1
  }
];

let examState = { current: 0, answers: [], score: 0 };

function startExam() {
  examState = { current: 0, answers: [], score: 0 };
  renderExamQuestion();
}

function renderExamQuestion() {
  const q = examQuestions[examState.current];
  const total = examQuestions.length;
  const pct = Math.round((examState.current / total) * 100);
  
  document.getElementById('examContent').innerHTML = `
    <div style="margin-bottom: 24px;">
      <div style="display:flex; justify-content: space-between; margin-bottom: 8px;">
        <strong style="color: var(--av-dark);">Вопрос ${examState.current + 1} из ${total}</strong>
        <span style="color: var(--text-soft);">Правильных: ${examState.score}</span>
      </div>
      <div class="progress-track" style="background: #e6ede8;">
        <div class="progress-fill" style="width: ${pct}%"></div>
      </div>
    </div>
    
    <div class="quiz" style="margin: 0;">
      <div class="quiz-question" style="font-size: 18px; margin: 0 0 20px;">${q.q}</div>
      <div class="quiz-options">
        ${q.options.map((opt, i) => `
          <button class="quiz-option" onclick="answerExam(${i})">
            <span class="marker">${String.fromCharCode(65 + i)}</span>
            <span>${opt}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function answerExam(idx) {
  const q = examQuestions[examState.current];
  const correct = q.correct === idx;
  if (correct) examState.score++;
  examState.answers.push({ q: q.q, given: idx, correct: q.correct });
  
  // Show feedback briefly
  const options = document.querySelectorAll('.quiz-option');
  options.forEach((opt, i) => {
    opt.style.pointerEvents = 'none';
    if (i === q.correct) opt.classList.add('correct');
    if (i === idx && !correct) opt.classList.add('wrong');
  });
  
  setTimeout(() => {
    examState.current++;
    if (examState.current >= examQuestions.length) {
      finishExam();
    } else {
      renderExamQuestion();
    }
  }, 1100);
}

function finishExam() {
  const passed = examState.score >= 7;
  const total = examQuestions.length;
  
  if (passed) {
    markComplete(10);
    document.getElementById('examContent').innerHTML = `
      <div style="text-align: center; padding: 30px 20px;">
        <div style="font-size: 72px; margin-bottom: 16px;">🎉</div>
        <h1 style="color: var(--av-darker); font-size: 32px; margin-bottom: 12px;">Поздравляем!</h1>
        <p style="font-size: 18px; color: var(--text-soft); margin-bottom: 24px;">Вы успешно прошли обучение по работе с WMS</p>
        
        <div class="stat-grid">
          <div class="stat-card">
            <span class="stat-num" style="color: var(--av-green);">${examState.score}/${total}</span>
            <div class="stat-label">Правильных ответов</div>
          </div>
          <div class="stat-card">
            <span class="stat-num" style="color: var(--av-green);">${Math.round(examState.score/total*100)}%</span>
            <div class="stat-label">Точность</div>
          </div>
        </div>
        
        <button class="btn btn-primary" onclick="goTo(10)" style="margin-top: 24px; font-size: 16px;">
          🎓 Получить сертификат
        </button>
      </div>
    `;
    showConfetti();
    setTimeout(() => showConfetti(), 500);
    setTimeout(() => showConfetti(), 1000);
  } else {
    document.getElementById('examContent').innerHTML = `
      <div style="text-align: center; padding: 30px 20px;">
        <div style="font-size: 72px; margin-bottom: 16px;">📚</div>
        <h1 style="color: var(--av-darker); font-size: 28px; margin-bottom: 12px;">Почти получилось!</h1>
        <p style="font-size: 17px; color: var(--text-soft); margin-bottom: 24px;">Правильных ответов: <strong>${examState.score} из ${total}</strong>.<br>Для сертификата нужно минимум 7. Попробуйте ещё раз!</p>
        
        <div class="nav-buttons" style="border: none; padding: 0; justify-content: center;">
          <button class="btn btn-ghost" onclick="prevModule()">← Повторить материал</button>
          <button class="btn btn-primary" onclick="startExam()">Пересдать экзамен</button>
        </div>
      </div>
    `;
  }
}

}

function printCert() {
  const cert = document.getElementById('certificate').outerHTML;
  const w = window.open('', '_blank');
  w.document.write(`
    <html><head><title>Сертификат — ${state.userName}</title>
    <style>
      body { font-family: -apple-system, sans-serif; padding: 40px; background: #F5F9F5;}
      .certificate {
        background: linear-gradient(135deg, #fff 0%, #fefbf0 100%);
        border: 8px double #1B5E3F;
        padding: 48px;
        border-radius: 16px;
        text-align: center;
        position: relative;
        max-width: 800px;
        margin: 0 auto;
      }
      .cert-seal { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px; background: #4CAF50; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 800; font-size: 12px; text-align: center; line-height: 1.2; transform: rotate(-12deg); }
      .cert-title { font-family: Georgia, serif; font-size: 18px; color: #1B5E3F; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 8px;}
      .cert-name { font-family: Georgia, serif; font-size: 48px; color: #0F3D26; margin: 24px 0; font-weight: 700; font-style: italic;}
      .cert-text { font-size: 16px; color: #4A5D52; max-width: 500px; margin: 16px auto; line-height: 1.6;}
      .logo-circle { width: 56px; height: 56px; background: #4CAF50; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-weight: 800; font-size: 22px; color: #0F3D26; font-family: Georgia, serif;}
      @media print { body { background: white; padding: 0;} }
    </style></head><body>${cert}</body></html>
  `);
  w.document.close();
  setTimeout(() => w.print(), 300);
}

function resetTraining() {
  if (confirm('Сбросить весь прогресс и начать заново?')) {
    state = { currentModule: 0, completed: [], userName: state.userName, quizScores: {} };
    save();
    goTo(0);
    updateProgress();
  }
}

// ============== ИНИЦИАЛИЗАЦИЯ ==============
renderSidebar();
renderContent();
updateProgress();
